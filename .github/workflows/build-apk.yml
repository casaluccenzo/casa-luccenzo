name: Build Android APK (Debug)

on:
  push:
    branches:
      - main
  workflow_dispatch: # Permite compilar manualmente desde la interfaz de GitHub

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Cordova Plugins Mock Directory
        run: |
          mkdir -p android/capacitor-cordova-android-plugins
          echo "// Mock variables" > android/capacitor-cordova-android-plugins/cordova.variables.gradle

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: Grant Execute Permission to gradlew
        run: chmod +x android/gradlew

      - name: Install Dependencies
        run: npm ci

      - name: Build Web Assets
        run: node scripts/build.js

      - name: Sync Capacitor
        run: |
          npx cap sync --verbose > sync-output.txt 2>&1 || true
          cat sync-output.txt
          # Check if build artifact or logs were created and if it succeeded
          if ! grep -q "Sync finished" sync-output.txt; then
            exit 1
          fi

      - name: Compile Android APK (Debug)
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Commit and Push Logs
        if: always()
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add -f sync-output.txt || true
          git commit -m "debug: cap sync logs [skip ci]" || true
          git push || true
