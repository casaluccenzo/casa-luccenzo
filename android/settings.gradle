plugins {
    id 'org.gradle.toolchains.foojay-resolver-convention' version '0.10.0'
}
include ':app'

def cordovaPluginDir = new File(settingsDir, './capacitor-cordova-android-plugins/')
if (cordovaPluginDir.exists()) {
    include ':capacitor-cordova-android-plugins'
    project(':capacitor-cordova-android-plugins').projectDir = cordovaPluginDir
}

apply from: 'capacitor.settings.gradle'